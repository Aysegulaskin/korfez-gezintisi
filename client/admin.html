<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

    <h1>Yönetici Paneli</h1>

    <input
        type="password"
        id="password"
        placeholder="Şifre">

    <button id="loginBtn">

        Giriş Yap

    </button>

    <div id="uploadArea" class="hidden">

        <h2>Fotoğraf Yükle</h2>

        <div id="dropZone">

            Fotoğrafı Buraya Sürükle

        </div>

        <input type="file" id="fileInput">

        <button id="uploadBtn">

            Yükle

        </button>

        <img id="preview">

    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
